name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Prepare artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $dir = "desktop-pet-${tag}-windows-x64"
          New-Item -ItemType Directory -Path $dir
          Copy-Item target/release/desktop-pet.exe "$dir/"
          Copy-Item assets "$dir/assets" -Recurse
          Copy-Item config "$dir/config" -Recurse
          Copy-Item README.md "$dir/"
          Compress-Archive -Path $dir -DestinationPath "${dir}.zip"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: desktop-pet-*-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Prepare artifact
        run: |
          TAG="${{ github.ref_name }}"
          DIR="desktop-pet-${TAG}-macos-x64"
          mkdir -p "$DIR"
          cp target/release/desktop-pet "$DIR/"
          cp -r assets "$DIR/"
          cp -r config "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: desktop-pet-*-macos-x64.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev libgtk-3-dev
      - name: Build
        run: cargo build --release
      - name: Prepare artifact
        run: |
          TAG="${{ github.ref_name }}"
          DIR="desktop-pet-${TAG}-linux-x64"
          mkdir -p "$DIR"
          cp target/release/desktop-pet "$DIR/"
          cp -r assets "$DIR/"
          cp -r config "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: desktop-pet-*-linux-x64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
